services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fraudguard
      POSTGRES_PASSWORD: fraudguard
      POSTGRES_DB: fraudguard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraudguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://fraudguard:fraudguard@db:5432/fraudguard
      SECRET_KEY: change-me-in-production
      CORS_ORIGINS: '["http://localhost:5173","http://localhost"]'
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
